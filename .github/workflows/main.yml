name: Update Seismogram

on:
  schedule:
    - cron: '*/10 * * * *' # Τρέχει αυτόματα κάθε 10 λεπτά
  workflow_dispatch: # Σου επιτρέπει να το ξεκινάς εσύ όποτε θες

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir matplotlib obspy

      - name: Run seismograph script
        run: python seismos.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update seismogram" || exit 0
          git push
