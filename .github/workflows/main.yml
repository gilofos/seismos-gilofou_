name: Update Seismogram
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install obspy matplotlib

      - name: Run script
        run: python seismos.py

      - name: Commit and Push
        run: |
          git config --global user.name "gilofos"
          git config --global user.email "gilofos@users.noreply.github.com"
          git add seismo_live.png
          git commit -m "Auto Update Seismo" || exit 0
          git push
