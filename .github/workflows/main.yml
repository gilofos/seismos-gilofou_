name: Update Seismogram
on:
  schedule:
    - cron: '*/5 * * * *'  # Τρέχει κάθε 5 λεπτά
  workflow_dispatch:       # Για να το ξεκινάς κι εσύ με το χέρι
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install obspy matplotlib
      - name: Run script
        run: python seismos.py
      - name: Commit and Push
        run: |
          git config --global user.name "ghilofos"
          git config --global user.email "action@github.com"
          git add seismo_live.png
          git commit -m "Auto Update Seismo" || exit 0
          git push
