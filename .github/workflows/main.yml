name: Update Seismogram

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [update_seismos]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install matplotlib requests obspy numpy pandas

      - name: Git Pull (Before script)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase

      - name: Run script
        run: python seismos.py

      - name: Commit and push changes
        run: |
          git add seismo_live.png seismos_history.txt
          git commit -m "Update seismogram and history $(date)" || echo "No changes to commit"
          git push origin main
