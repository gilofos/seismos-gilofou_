name: Update Seismogram

on:
  schedule:
    # Το 5 είναι το πιο γρήγορο που επιτρέπει επίσημα το GitHub
    - cron: '*/5 * * * *'
  workflow_dispatch: # Σου επιτρέπει να το πατάς και εσύ χειροκίνητα

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip' # <--- ΑΥΤΟ ΤΟ ΚΑΝΕΙ ΓΡΗΓΟΡΟ

      - name: Install dependencies
        run: |
          pip install matplotlib obspy

      - name: Run seismograph script
        run: python seismos.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add seismo_live.png
          git commit -m "Update seismogram" || exit 0
          git push
